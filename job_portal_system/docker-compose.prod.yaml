version: '3.8'
services:

  users-db:
    image: postgres:16-alpine
    container_name: prod-users-db
    environment:
      POSTGRES_DB:       users_db
      POSTGRES_USER:     jp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - prod-users-db-data:/var/lib/postgresql/data
      - "./User Management Service/init-scripts:/docker-entrypoint-initdb.d:ro"
    networks:
      - job-portal-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jp_user -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  jobs-db:
    image: postgres:16-alpine
    container_name: prod-jobs-db
    environment:
      POSTGRES_DB:       jobs_db
      POSTGRES_USER:     jp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - prod-jobs-db-data:/var/lib/postgresql/data
      - "./Job Service/init-scripts:/docker-entrypoint-initdb.d:ro"
    networks:
      - job-portal-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jp_user -d jobs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  apps-db:
    image: postgres:16-alpine
    container_name: prod-apps-db
    environment:
      POSTGRES_DB:       apps_db
      POSTGRES_USER:     jp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - prod-apps-db-data:/var/lib/postgresql/data
      - "./Application Service/init-scripts:/docker-entrypoint-initdb.d:ro"
    networks:
      - job-portal-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jp_user -d apps_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  user-management-service:
    build:
      context: "./User Management Service"
      dockerfile: dockerfile
    container_name: prod-user-service
    ports:
      - "5001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://jp_user:${DB_PASSWORD}@users-db:5432/users_db
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - job-portal-prod-net
    depends_on:
      users-db:
        condition: service_healthy
    restart: always

  job-service:
    build:
      context: "./Job Service"
      dockerfile: dockerfile
    container_name: prod-job-service
    ports:
      - "5002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://jp_user:${DB_PASSWORD}@jobs-db:5432/jobs_db
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - job-portal-prod-net
    depends_on:
      jobs-db:
        condition: service_healthy
    restart: always

  application-service:
    build:
      context: "./Application Service"
      dockerfile: dockerfile
    container_name: prod-application-service
    ports:
      - "5003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://jp_user:${DB_PASSWORD}@apps-db:5432/apps_db
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_URL: http://notification-service:3004
    networks:
      - job-portal-prod-net
    depends_on:
      apps-db:
        condition: service_healthy
    restart: always

  notification-service:
    build:
      context: "./Notification Service"
      dockerfile: dockerfile
    container_name: prod-notification-service
    ports:
      - "5004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    networks:
      - job-portal-prod-net
    restart: always

networks:
  job-portal-prod-net:
    name: job-portal-prod-net
    driver: bridge

volumes:
  prod-users-db-data:
  prod-jobs-db-data:
  prod-apps-db-data:

frontend:
    build:
      context: "./Frontend"
      dockerfile: dockerfile
    container_name: prod-frontend
    ports:
      - "8082:80"
    networks:
      - job-portal-prod-net
    depends_on:
      - user-management-service
      - job-service
      - application-service
    restart: always