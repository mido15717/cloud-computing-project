apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management-service
  namespace: job-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-management-service
  template:
    metadata:
      labels:
        app: user-management-service
    spec:
      containers:
        - name: user-management-service
          image: user-management-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: NODE_ENV
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: job-portal-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              value: "postgresql://jp_user:jp_pass@users-db:5432/users_db"