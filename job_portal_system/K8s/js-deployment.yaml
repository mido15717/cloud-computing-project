apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: job-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
    spec:
      containers:
        - name: job-service
          image: job-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: NODE_ENV
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: job-portal-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              value: "postgresql://jp_user:jp_pass@jobs-db:5432/jobs_db"