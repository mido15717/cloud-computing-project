apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: job-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: job-portal-config
                  key: NODE_ENV
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
