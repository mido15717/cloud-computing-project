events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # ── Serve static HTML files ───────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        # ── API routing — forward to backend services ─────────────────────────
        location /api/users/ {
            proxy_pass http://user-management-service:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/jobs/ {
            proxy_pass http://job-service:3002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/applications/ {
            proxy_pass http://application-service:3003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend routes — serve index.html for all page routes ────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
