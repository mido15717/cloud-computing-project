<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Portal — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="logo" href="index.html">JobPortal</a>
  <div class="nav-links">
    <a href="index.html">Jobs</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
</nav>

<div class="form-card">
  <h2>Login</h2>
  <div id="alert"></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn btn-primary btn-full" onclick="login()">Login</button>

  <div class="link-text">
    Don't have an account? <a href="signup.html">Sign up here</a>
  </div>
</div>

<script>
  async function login() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const alertDiv = document.getElementById('alert');

    if (!email || !password) {
      alertDiv.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
      return;
    }

    const res  = await fetch('/api/users/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('role',  data.role);
      localStorage.setItem('userId', data.id);
      alertDiv.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
      setTimeout(() => window.location.href = 'index.html', 1000);
    } else {
      alertDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
