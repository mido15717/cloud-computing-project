<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Portal — Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="logo" href="index.html">💼 JobPortal</a>
  <div class="nav-links">
    <a href="index.html">Jobs</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
</nav>

<div class="form-card">
  <h2>Create Account</h2>
  <div id="alert"></div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Mohamed Ahmed">
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="form-group">
    <label>I am a...</label>
    <select id="role">
      <option value="seeker">Job Seeker</option>
      <option value="employer">Employer</option>
    </select>
  </div>

  <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>

  <div class="link-text">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<script>
  async function register() {
    const name     = document.getElementById('name').value;
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;
    const alertDiv = document.getElementById('alert');

    if (!name || !email || !password) {
      alertDiv.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
      return;
    }

    const res  = await fetch('/api/users/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, role })
    });

    const data = await res.json();

    if (res.ok) {
      alertDiv.innerHTML = '<div class="alert alert-success">Account created! Redirecting to login...</div>';
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      alertDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
    }
  }
</script>
</body>
</html>
